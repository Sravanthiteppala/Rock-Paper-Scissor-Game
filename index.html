<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Zone: Rock Paper Scissors</title>
    <style>
        :root {
            --bg: #0d0e15;
            --panel-bg: rgba(22, 25, 41, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --arcade-red: #ff3366;
            --arcade-blue: #33ccff;
            --arcade-yellow: #ffcc00;
            --text-main: #ffffff;
            --text-muted: #707793;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Impact', 'Arial Black', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 51, 102, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(51, 204, 255, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Arcade Cabinet Wrapper */
        .arcade-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 4px solid #1f2336;
            border-radius: 28px;
            width: 100%;
            max-width: 850px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        /* Retro Arcade Title */
        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 
                0 0 10px var(--arcade-red),
                0 0 20px var(--arcade-red),
                0 0 40px rgba(255, 51, 102, 0.5);
            font-style: italic;
        }

        .subtitle {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--arcade-blue);
            margin-bottom: 35px;
            font-weight: 700;
        }

        /* Scoreboard Grid */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #07080d;
            border: 2px solid #1f2336;
            border-radius: 16px;
            padding: 15px 35px;
            margin-bottom: 40px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .player-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tag {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .p1-tag { color: var(--arcade-blue); text-shadow: 0 0 8px rgba(51, 204, 255, 0.5); }
        .cpu-tag { color: var(--arcade-red); text-shadow: 0 0 8px rgba(255, 51, 102, 0.5); }

        .score-counter {
            font-size: 2.5rem;
            font-weight: 900;
            background: #121420;
            padding: 4px 24px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--arcade-yellow);
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
        }

        /* Weapon Selection Cards */
        .weapons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .weapon-card {
            background: rgba(255, 255, 255, 0.02);
            border: 3px solid #1f2336;
            border-radius: 20px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Color profiles per arcade item */
        .weapon-card[data-weapon="rock"] { --neon: var(--arcade-blue); }
        .weapon-card[data-weapon="paper"] { --neon: var(--arcade-yellow); }
        .weapon-card[data-weapon="scissors"] { --neon: var(--arcade-red); }

        .icon-holder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #07080d;
            border: 3px solid var(--neon);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            box-shadow: 0 0 15px var(--neon);
            transition: transform 0.2s ease;
        }

        .action-btn {
            width: 100%;
            background: transparent;
            border: 3px solid var(--neon);
            color: #fff;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Micro-interactions */
        .weapon-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--neon);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .weapon-card:hover .icon-holder {
            transform: rotate(-10deg) scale(1.05);
        }
        .weapon-card:hover .action-btn {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }

        /* Bottom Display Screen */
        .display-screen {
            background: #040508;
            border: 3px solid #1f2336;
            border-radius: 16px;
            padding: 25px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .screen-status {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .screen-subtext {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Responsive Settings */
        @media (max-width: 768px) {
            .arcade-container { padding: 25px 20px; border-width: 2px; }
            h1 { font-size: 2.3rem; }
            .subtitle { margin-bottom: 25px; }
            .scoreboard { padding: 12px 20px; margin-bottom: 25px; }
            .tag { font-size: 1.1rem; }
            .score-counter { font-size: 1.8rem; padding: 2px 16px; }
            .weapons-grid { grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
            .weapon-card { flex-direction: row; padding: 15px 25px; justify-content: space-between; }
            .icon-holder { width: 65px; height: 65px; font-size: 2.2rem; }
            .action-btn { width: 130px; padding: 8px 0; font-size: 0.95rem; }
            .screen-status { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <h1>Arcade Zone</h1>
        <div class="subtitle">Insert Coin & Select Move</div>

        <div class="scoreboard">
            <div class="player-side">
                <div class="tag p1-tag">Player 1</div>
            </div>
            
            <div class="score-counter">
                <span id="player-score">00</span> - <span id="cpu-score">00</span>
            </div>

            <div class="player-side">
                <div class="tag cpu-tag">CPU</div>
            </div>
        </div>

        <div class="weapons-grid">
            <div class="weapon-card" data-weapon="rock">
                <div class="icon-holder">✊</div>
                <button class="action-btn">Rock</button>
            </div>
            <div class="weapon-card" data-weapon="paper">
                <div class="icon-holder">✋</div>
                <button class="action-btn">Paper</button>
            </div>
            <div class="weapon-card" data-weapon="scissors">
                <div class="icon-holder">✌️</div>
                <button class="action-btn">Scissors</button>
            </div>
        </div>

        <div class="display-screen" id="screen">
            <div class="screen-status" style="color: var(--text-muted)">Insert Coin</div>
            <div class="screen-subtext">Choose your element to challenge the computer counter</div>
        </div>
    </div>

    <script>
        let pScore = 0;
        let cScore = 0;

        const screen = document.getElementById('screen');
        const pScoreDisplay = document.getElementById('player-score');
        const cScoreDisplay = document.getElementById('cpu-score');

        const colors = {
            rock: 'var(--arcade-blue)',
            paper: 'var(--arcade-yellow)',
            scissors: 'var(--arcade-red)'
        };

        function getCPUChoice() {
            const items = ['rock', 'paper', 'scissors'];
            return items[Math.floor(Math.random() * items.length)];
        }

        // Pad display values for vintage arcade layout (e.g. "03" instead of "3")
        function formatScore(num) {
            return num.toString().padStart(2, '0');
        }

        function play(playerSelection) {
            const cpuSelection = getCPUChoice();
            let result = '';

            if (playerSelection === cpuSelection) {
                result = 'draw';
            } else if (
                (playerSelection === 'rock' && cpuSelection === 'scissors') ||
                (playerSelection === 'paper' && cpuSelection === 'rock') ||
                (playerSelection === 'scissors' && cpuSelection === 'paper')
            ) {
                result = 'win';
            } else {
                result = 'lose';
            }

            updateScreen(result, playerSelection, cpuSelection);
        }

        function updateScreen(result, pChoice, cChoice) {
            let titleText = '';
            let borderColor = '#1f2336';

            if (result === 'win') {
                pScore++;
                pScoreDisplay.textContent = formatScore(pScore);
                titleText = `<div class="screen-status" style="color: var(--arcade-blue)">Player 1 Wins!</div>`;
                borderColor = 'var(--arcade-blue)';
            } else if (result === 'lose') {
                cScore++;
                cScoreDisplay.textContent = formatScore(cScore);
                titleText = `<div class="screen-status" style="color: var(--arcade-red)">CPU Wins!</div>`;
                borderColor = 'var(--arcade-red)';
            } else {
                titleText = `<div class="screen-status" style="color: var(--arcade-yellow)">Tie Match!</div>`;
                borderColor = 'var(--arcade-yellow)';
            }

            screen.innerHTML = `
                ${titleText}
                <div class="screen-subtext">
                    P1: <span style="color: ${colors[pChoice]}">${pChoice.toUpperCase()}</span> vs 
                    CPU: <span style="color: ${colors[cChoice]}">${cChoice.toUpperCase()}</span>
                </div>
            `;
            screen.style.borderColor = borderColor;
        }

        document.querySelectorAll('.weapon-card').forEach(card => {
            card.addEventListener('click', () => {
                play(card.getAttribute('data-weapon'));
            });
        });
    </script>
</body>
</html>
