<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Clash: RPS</title>
    <style>
        :root {
            --bg: #0b0914;
            --panel-bg: rgba(20, 16, 38, 0.6);
            --border: rgba(255, 255, 255, 0.05);
            --neon-orange: #ff5e00;
            --neon-blue: #00bfff;
            --neon-green: #00ff66;
            --neon-pink: #ff007f;
            --text-main: #ffffff;
            --text-muted: #8b85b1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 127, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 191, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Game Wrapper */
        .game-wrapper {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Title Area */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.2);
        }

        /* Header / Profile & Scoreboards */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px 30px;
            margin-bottom: 40px;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
        }

        .player-one .avatar { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 191, 255, 0.3); }
        .system-ai .avatar { border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }

        .profile-info { text-align: left; }
        .profile-info .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .profile-info .name { font-weight: 600; font-size: 1rem; }

        .score-display {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .score-display span#p-score { color: var(--neon-blue); }
        .score-display span#ai-score { color: var(--neon-pink); }

        /* Hexagonal / Styled Weapon Grid */
        .weapons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .weapon-card {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Unique Glow Themes per Weapon */
        .weapon-card[data-weapon="rock"] { --theme: var(--neon-orange); }
        .weapon-card[data-weapon="paper"] { --theme: var(--neon-blue); }
        .weapon-card[data-weapon="scissors"] { --theme: var(--neon-green); }

        .weapon-icon-box {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            border: 2px solid var(--theme);
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05), 0 0 15px calc(var(--theme));
            transition: transform 0.3s ease;
        }

        .weapon-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--theme);
            color: #fff;
            padding: 12px 0;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(var(--theme), 0.2);
            transition: all 0.3s ease;
        }

        /* Hover Mechanics */
        .weapon-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--theme);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        .weapon-card:hover .weapon-icon-box {
            transform: scale(1.08);
        }
        .weapon-card:hover .weapon-btn {
            background: var(--theme);
            color: #000;
            box-shadow: 0 0 20px var(--theme);
        }

        /* Result Panel Footer */
        .result-panel {
            background: rgba(7, 5, 15, 0.8);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-details {
            font-size: 1rem;
            color: var(--text-muted);
        }
        .result-details strong {
            text-transform: uppercase;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .game-wrapper { padding: 25px 20px; }
            h1 { font-size: 1.9rem; margin-bottom: 20px; }
            .header-panel { padding: 12px 15px; gap: 10px; margin-bottom: 25px; }
            .profile-info { display: none; } /* Compact Mode for Mobile Avatars */
            .weapons-grid { grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
            .weapon-card { flex-direction: row; padding: 15px; justify-content: space-between; }
            .weapon-icon-box { width: 60px; height: 60px; font-size: 2rem; border-radius: 14px; }
            .weapon-btn { width: 140px; }
            .result-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- Interactive Game Title -->
        <h1>Quantum Clash: RPS</h1>

        <!-- High-Fidelity Score Board Grid -->
        <div class="header-panel">
            <div class="profile player-one">
                <div class="avatar">🦁</div>
                <div class="profile-info">
                    <div class="label">Player One</div>
                    <div class="name">Operative</div>
                </div>
            </div>

            <div class="score-display">
                <span id="p-score">0</span> : <span id="ai-score">0</span>
            </div>

            <div class="profile system-ai">
                <div class="profile-info" style="text-align: right;">
                    <div class="label">System AI</div>
                    <div class="name">Core Engine</div>
                </div>
                <div class="avatar">🤖</div>
            </div>
        </div>

        <!-- Weapons Layout Core -->
        <div class="weapons-grid">
            <!-- Rock weapon card -->
            <div class="weapon-card" data-weapon="rock">
                <div class="weapon-icon-box">✊</div>
                <button class="weapon-btn">Rock</button>
            </div>
            <!-- Paper weapon card -->
            <div class="weapon-card" data-weapon="paper">
                <div class="weapon-icon-box">✋</div>
                <button class="weapon-btn">Paper</button>
            </div>
            <!-- Scissors weapon card -->
            <div class="weapon-card" data-weapon="scissors">
                <div class="weapon-icon-box">✌️</div>
                <button class="weapon-btn">Scissors</button>
            </div>
        </div>

        <!-- Dynamic Status Display Panel -->
        <div class="result-panel" id="result-box">
            <div class="result-title" style="color: var(--text-muted)">Awaiting Deployment</div>
            <div class="result-details">Select your tactical gesture to initiate round</div>
        </div>
    </div>

    <script>
        let pScore = 0;
        let aiScore = 0;

        const resultBox = document.getElementById('result-box');
        const pScoreDisplay = document.getElementById('p-score');
        const aiScoreDisplay = document.getElementById('ai-score');

        const weaponColors = {
            rock: 'var(--neon-orange)',
            paper: 'var(--neon-blue)',
            scissors: 'var(--neon-green)'
        };

        function getAIChoice() {
            const options = ['rock', 'paper', 'scissors'];
            return options[Math.floor(Math.random() * options.length)];
        }

        function playRound(playerChoice) {
            const aiChoice = getAIChoice();
            let finalState = ''; 
            
            if (playerChoice === aiChoice) {
                finalState = 'draw';
            } else if (
                (playerChoice === 'rock' && aiChoice === 'scissors') ||
                (playerChoice === 'paper' && aiChoice === 'rock') ||
                (playerChoice === 'scissors' && aiChoice === 'paper')
            ) {
                finalState = 'win';
            } else {
                finalState = 'lose';
            }

            renderMatchResult(finalState, playerChoice, aiChoice);
        }

        function renderMatchResult(state, pChoice, aiChoice) {
            let titleEl = '';
            let borderStyle = '';

            if (state === 'win') {
                pScore++;
                pScoreDisplay.textContent = pScore;
                titleEl = `<div class="result-title" style="color: var(--neon-green)">Result: You Win!</div>`;
                borderStyle = '2px solid var(--neon-green)';
            } else if (state === 'lose') {
                aiScore++;
                aiScoreDisplay.textContent = aiScore;
                titleEl = `<div class="result-title" style="color: var(--neon-pink)">Result: AI Wins!</div>`;
                borderStyle = '2px solid var(--neon-pink)';
            } else {
                titleEl = `<div class="result-title" style="color: #ffffff">Result: Draw Parity!</div>`;
                borderStyle = '2px solid rgba(255, 255, 255, 0.2)';
            }

            // Injected inner data structure update
            resultBox.innerHTML = `
                ${titleEl}
                <div class="result-details">
                    You chose <strong style="color: ${weaponColors[pChoice]}">${pChoice}</strong> &nbsp;|&nbsp; 
                    System AI chose <strong style="color: ${weaponColors[aiChoice]}">${aiChoice}</strong>
                </div>
            `;
            resultBox.style.border = borderStyle;
        }

        // Add Event Listeners seamlessly to cards
        document.querySelectorAll('.weapon-card').forEach(card => {
            card.addEventListener('click', () => {
                const selectedWeapon = card.getAttribute('data-weapon');
                playRound(selectedWeapon);
            });
        });
    </script>
</body>
</html>
